<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your ShopEase shopping bag. Review items, update quantities, and proceed to checkout.">
  <title>Your Bag — ShopEase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      background-color: #0c0a1a;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(42,157,92,.1) 0%, transparent 50%);
      color: #e8e8f0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
  </style>
</head>
<body>

<div class="cart-page">
  <div class="cart-wrapper">
    <div class="cart-title">🛍️ Your Bag</div>
    <div class="cart-subtitle">Review your items before checkout</div>

    <div id="cart-items">
      <!-- Rendered by main.js -->
    </div>

    <div id="cart-summary">
      <!-- Rendered by main.js -->
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="main.js"></script>
</body>
</html>
