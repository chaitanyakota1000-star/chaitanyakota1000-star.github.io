<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with ShopEase support. We're here to help with orders, returns, and questions.">
  <title>Contact Us — ShopEase</title>
  <link rel="stylesheet" href="style.css?v=1.2">
  <style>
    body {
      margin: 0; min-height: 100vh;
      /* background overridden by style.css */ /* background */: linear-gradient(135deg, #85edbb, #e2e8f0);
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="contact-card">
  <h1>📞 Contact Us</h1>

  <form id="contactForm" onsubmit="return handleContact(event)">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="username">Your Name</label>
      <input id="username" name="username" type="text" placeholder="Full name" required>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="How can we help you?" required></textarea>
    </div>

    <button type="submit" class="auth-btn">Send Message →</button>
  </form>

  <div class="auth-link" style="margin-top:18px;">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<div id="toast-container"></div>
<script src="main.js"></script>
<script>
  function handleContact(e) {
    e.preventDefault();
    const name = document.getElementById('username').value.trim();
    if (!name) { showToast('Please fill in all fields', 'error'); return false; }
    showToast('Message sent! We\'ll get back to you shortly. 📬');
    document.getElementById('contactForm').reset();
    return false;
  }
</script>
</body>
</html>
