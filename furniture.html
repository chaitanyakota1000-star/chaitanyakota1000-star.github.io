<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop premium furniture at ShopEase — sofas, beds, tables, chairs, and more.">
    <title>Furniture — ShopEase</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <style>
        body { margin:0; min-height:100vh; /* background overridden by style.css */ /* background */: linear-gradient(135deg, #85edbb, #e2e8f0); }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <h1 style="text-align:center; margin:2rem 0 1rem; font-size:2.2rem; color:#1a202c;">Home & Furniture</h1>

    <div class="products-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=300" alt="Modern Sofa">
            <div class="product-name">Modern Sofa</div>
            <div class="product-price">₹45,000</div>
            <button class="add-cart-btn" onclick="addToCart('modern-sofa')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1506439773649-6e0eb8cfb237?w=300" alt="Velvet Chair">
            <div class="product-name">Velvet Chair</div>
            <div class="product-price">₹12,500</div>
            <button class="add-cart-btn" onclick="addToCart('velvet-chair')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1615066390971-03e4e1c36ddf?w=300" alt="Oak Dining Table">
            <div class="product-name">Oak Dining Table</div>
            <div class="product-price">₹32,000</div>
            <button class="add-cart-btn" onclick="addToCart('oak-dining-table')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=300" alt="King Size Bed">
            <div class="product-name">King Size Bed</div>
            <div class="product-price">₹55,000</div>
            <button class="add-cart-btn" onclick="addToCart('king-size-bed')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1594620302200-9a762244a156?w=300" alt="Wooden Bookshelf">
            <div class="product-name">Wooden Bookshelf</div>
            <div class="product-price">₹8,900</div>
            <button class="add-cart-btn" onclick="addToCart('wooden-bookshelf')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=300" alt="Coffee Table">
            <div class="product-name">Coffee Table</div>
            <div class="product-price">₹6,400</div>
            <button class="add-cart-btn" onclick="addToCart('coffee-table')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?w=300" alt="Office Desk">
            <div class="product-name">Office Desk</div>
            <div class="product-price">₹14,200</div>
            <button class="add-cart-btn" onclick="addToCart('office-desk')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1503602642458-232111445657?w=300" alt="Bar Stool">
            <div class="product-name">Bar Stool</div>
            <div class="product-price">₹4,500</div>
            <button class="add-cart-btn" onclick="addToCart('bar-stool')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=300" alt="Armchair">
            <div class="product-name">Armchair</div>
            <div class="product-price">₹9,800</div>
            <button class="add-cart-btn" onclick="addToCart('armchair')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=300" alt="Lounge Chair">
            <div class="product-name">Lounge Chair</div>
            <div class="product-price">₹15,000</div>
            <button class="add-cart-btn" onclick="addToCart('lounge-chair')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1532372320572-cda25653a26d?w=300" alt="Nightstand">
            <div class="product-name">Nightstand</div>
            <div class="product-price">₹3,200</div>
            <button class="add-cart-btn" onclick="addToCart('nightstand')">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?w=300" alt="TV Unit">
            <div class="product-name">TV Unit</div>
            <div class="product-price">₹18,900</div>
            <button class="add-cart-btn" onclick="addToCart('tv-unit')">Add to Cart</button>
        </div>
    </div>

    <script src="main.js?v=5.0"></script>
</body>
</html>
