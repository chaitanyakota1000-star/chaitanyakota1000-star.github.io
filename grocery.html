<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fresh groceries at ShopEase — fruits, vegetables, staples, and daily essentials delivered to your door.">
    <title>Grocery — ShopEase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin:0; min-height:100vh; background: linear-gradient(135deg, #85edbb, #e2e8f0); }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <h1 class="section-title">Grocery</h1>

    <div class="products-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1587334274328-64186a80aeee?w=300" alt="Bananas">
            <div class="product-name">Bananas</div>
            <div class="product-price">₹60</div>
            <button class="add-cart-btn" onclick="addToCart('Bananas', 60)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b?w=300" alt="Apples">
            <div class="product-name">Apples</div>
            <div class="product-price">₹180</div>
            <button class="add-cart-btn" onclick="addToCart('Apples', 180)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1550989460-0adf9ea622e2?w=300" alt="Rice">
            <div class="product-name">Rice</div>
            <div class="product-price">₹120</div>
            <button class="add-cart-btn" onclick="addToCart('Rice', 120)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=300" alt="Spinach">
            <div class="product-name">Spinach</div>
            <div class="product-price">₹30</div>
            <button class="add-cart-btn" onclick="addToCart('Spinach', 30)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1588166524941-3bf61a9c41db?w=300" alt="Bread">
            <div class="product-name">Bread</div>
            <div class="product-price">₹45</div>
            <button class="add-cart-btn" onclick="addToCart('Bread', 45)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1518843875459-f738682238a6?w=300" alt="Broccoli">
            <div class="product-name">Broccoli</div>
            <div class="product-price">₹70</div>
            <button class="add-cart-btn" onclick="addToCart('Broccoli', 70)">Add to Cart</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
