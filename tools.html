<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop power tools and hand tools at ShopEase — drills, hammers, saws, and more for DIY projects.">
    <title>Tools — ShopEase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            /* background overridden by style.css */ /* background */: linear-gradient(135deg, #85edbb, #e2e8f0);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

            <div class="product-name">Power Drill</div>
            <div class="product-price">₹4,200</div>
            <button class="add-cart-btn" onclick="addToCart('Power Drill', 4200)">Add to Cart</button>

        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=400" alt="Screwdriver Set">

            <div class="product-price">₹899</div>
            <button class="add-cart-btn" onclick="addToCart('Screwdriver Set', 899)">Add to Cart</button>

            <button class="add-cart-btn" onclick="addToCart('Wrench Kit', 1550)">Add to Cart</button>

        <div class="product-card">

            <div class="product-price">₹650</div>
            <button class="add-cart-btn" onclick="addToCart('Pliers Set', 650)">Add to Cart</button>

            <div class="product-price">₹550</div>

            <div class="product-price">₹850</div>
